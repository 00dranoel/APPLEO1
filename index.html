<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LeoEnergy Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        :root { --bg: #0f172a; --card: #1e293b; --accent: #2563eb; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: #f8fafc; margin: 0; -webkit-tap-highlight-color: transparent; }
        .card { background-color: var(--card); border: 1px solid #334155; border-radius: 1.5rem; }
        .active-tab { background-color: var(--accent) !important; color: white !important; box-shadow: 0 8px 20px rgba(37,99,235,0.3); }
        .active-month { background-color: var(--accent) !important; color: white !important; border-color: #3b82f6 !important; }
        .disabled-month { background-color: #0f172a !important; color: #1e293b !important; border-style: dashed !important; opacity: 0.3; cursor: not-allowed; }
        .section-hidden { display: none; }
        input, select { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 1rem; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #status-dot.online { width: 14px; height: 14px; box-shadow: 0 0 12px #10b981, 0 0 4px #10b981; }
        .prediction-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #8b5cf6; }
        .edit-mode { border: 2px solid #eab308 !important; }
    </style>
</head>
<body class="pb-10">

    <header class="p-5 flex justify-between items-center bg-[#0f172a]/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-50">
        <div class="flex items-center gap-3" onclick="location.reload()">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            </div>
            <div>
                <h1 class="font-bold text-xl tracking-tight leading-none text-white">LeoEnergy</h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="status-dot" class="rounded-full bg-emerald-500 online transition-all duration-500"></div>
                    <span id="status-text" class="text-[13px] font-black text-emerald-400 uppercase tracking-widest">Online</span>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="showSection('predict')" class="p-3 bg-slate-800 rounded-2xl text-purple-400 border border-slate-700 active:scale-90"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></button>
            <button onclick="showSection('analysis')" class="p-3 bg-slate-800 rounded-2xl text-blue-400 border border-slate-700 active:scale-90"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg></button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="sec-main" class="space-y-4">
            <div class="card p-1 flex gap-1 shadow-sm overflow-x-auto no-scrollbar">
                <button onclick="switchTab('Luce')" id="tab-Luce" class="active-tab flex-1 py-3 px-4 rounded-xl font-bold text-[10px] uppercase min-w-[80px]">Luce</button>
                <button onclick="switchTab('Gas')" id="tab-Gas" class="flex-1 py-3 px-4 rounded-xl font-bold text-[10px] uppercase text-slate-400 min-w-[80px]">Gas</button>
                <button onclick="switchTab('Acqua')" id="tab-Acqua" class="flex-1 py-3 px-4 rounded-xl font-bold text-[10px] uppercase text-slate-400 min-w-[80px]">Acqua</button>
                <button onclick="switchTab('Rifiuti')" id="tab-Rifiuti" class="flex-1 py-3 px-4 rounded-xl font-bold text-[10px] uppercase text-slate-400 min-w-[80px]">Rifiuti</button>
                <button onclick="switchTab('Altro')" id="tab-Altro" class="flex-1 py-3 px-4 rounded-xl font-bold text-[10px] uppercase text-slate-400 min-w-[80px]">Altro</button>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="card p-4 border-l-4 border-blue-500">
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Ultima Bolletta</p>
                    <p id="widget-last-cost" class="text-lg font-black text-white leading-none">€ 0.00</p>
                    <p id="widget-last-qty" class="text-[9px] font-bold text-slate-400 mt-1 uppercase leading-tight"></p>
                </div>
                <div class="card p-4 border-l-4 border-emerald-500">
                    <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Media Mese 2026</p>
                    <p id="widget-avg-cost" class="text-lg font-black text-white leading-none">€ 0.00</p>
                    <p id="widget-avg-qty" class="text-[9px] font-bold text-slate-400 mt-1 uppercase leading-tight"></p>
                </div>
            </div>

            <div class="card p-6 h-64 shadow-xl relative">
                <div class="h-44 mt-4"><canvas id="mainChart"></canvas></div>
            </div>

            <div id="form-card" class="card p-6 space-y-6 bg-slate-800/30">
                <div class="flex justify-between items-center"><span id="form-title" class="text-[10px] font-black text-slate-500 uppercase">Nuovo Inserimento</span><button onclick="resetForm()" id="btn-cancel-edit" class="hidden text-[10px] font-bold text-rose-500 uppercase">Annulla</button></div>
                <div class="grid grid-cols-6 gap-2" id="grid-months"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 p-3 rounded-2xl border border-slate-700"><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">Anno</label><input type="number" id="in-year" onchange="initMonths()" class="font-bold"></div>
                    <div class="bg-slate-900 p-3 rounded-2xl border border-slate-700"><label class="text-[9px] font-bold text-slate-500 uppercase mb-1 block">Spesa €</label><input type="number" id="in-cost" placeholder="0.00" class="font-bold text-emerald-400"></div>
                </div>
                <div id="note-container" class="hidden"><input type="text" id="in-note" placeholder="Dettagli..." class="bg-slate-900 p-4 rounded-2xl border border-slate-700 text-sm w-full"></div>
                <div class="text-center"><input type="number" id="in-qty" placeholder="0.00" class="text-6xl font-black text-center tracking-tighter"><p id="unit-txt" class="text-slate-500 font-bold text-[11px] uppercase mt-2">kWh</p></div>
                <button onclick="saveData()" id="btn-save" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase active:scale-95 transition-all">Salva</button>
            </div>
            <div id="history-list" class="space-y-3 pb-20"></div>
        </div>

        <div id="sec-analysis" class="section-hidden space-y-6">
            <div class="flex justify-between items-end px-2">
                <h2 class="text-3xl font-black">Report</h2>
                <div class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 flex flex-col min-w-[110px]">
                    <span class="text-[9px] font-black text-slate-500 uppercase">Anno Filtro</span>
                    <select id="analysis-year-filter" onchange="updateAnalysisUI()" class="text-base font-bold text-blue-400"></select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="card p-5"><p class="text-[10px] font-bold text-slate-500 uppercase">Spesa Totale</p><p id="stat-total-year" class="text-2xl font-black">€ 0.00</p></div>
                <div class="card p-5">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Media Mese</p>
                    <p id="stat-avg-month" class="text-2xl font-black">€ 0.00</p>
                    <p id="stat-avg-info" class="text-[9px] font-bold text-blue-400/80 uppercase mt-1"></p>
                </div>
            </div>
            
            <div id="stats-grid" class="grid grid-cols-1 gap-3"></div>

            <div class="card p-6 flex flex-col items-center">
                <p class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest">Incidenza Costi</p>
                <div class="w-32 h-32"><canvas id="analysisPieChart"></canvas></div>
            </div>
            <button onclick="showSection('main')" class="w-full py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold border border-slate-700 uppercase text-xs">Torna alla Home</button>
        </div>

        <div id="sec-predict" class="section-hidden space-y-6">
            <h2 class="text-2xl font-black px-2 text-purple-400">Previsioni 🔮</h2>
            <div id="prediction-list" class="space-y-4"></div>
            <button onclick="showSection('main')" class="w-full py-4 bg-slate-800 text-slate-400 rounded-2xl font-bold border border-slate-700 uppercase text-xs">Chiudi</button>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw1xjt9doYN9C0iulj1PTTu_e6MQsF7pRL8Kh9TuTaN15fI-HTYL_aR453avosJ6zyjdw/exec";
        const MONTHS = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const STYLE = { 
            Luce: { color: '#eab308', unit: 'kWh', freq: 2, labelFreq: 'Bimestrale' }, 
            Gas: { color: '#f97316', unit: 'Smc', freq: 2, labelFreq: 'Bimestrale' }, 
            Acqua: { color: '#3b82f6', unit: 'm³', freq: 3, labelFreq: 'Trimestrale' }, 
            Rifiuti: { color: '#22c55e', unit: 'Kg', freq: 6, labelFreq: 'Semestrale' }, 
            Altro: { color: '#a855f7', unit: 'Pz', freq: 1, labelFreq: 'Mensile' }
        };

        let currentTab = 'Luce', selectedMonths = [], dataStore = [], mainChart, analysisPieChart, editId = null;

        window.onload = () => { 
            document.getElementById('in-year').value = new Date().getFullYear(); 
            initCharts(); 
            fetchData(); 
        };

        function showSection(sec) {
            document.querySelectorAll('main > div').forEach(d => d.classList.add('section-hidden'));
            document.getElementById('sec-' + sec).classList.remove('section-hidden');
            if(sec === 'analysis') { updateYearFilter(); updateAnalysisUI(); }
            if(sec === 'predict') updatePredictionUI();
        }

        function updateYearFilter() {
            const filter = document.getElementById('analysis-year-filter');
            const years = [...new Set(dataStore.map(d => d.year))].sort((a,b) => b-a);
            const currentVal = filter.value || new Date().getFullYear();
            filter.innerHTML = years.map(y => `<option value="${y}" ${y == currentVal ? 'selected' : ''}>${y}</option>`).join('');
            if(years.length === 0) filter.innerHTML = `<option value="${new Date().getFullYear()}">${new Date().getFullYear()}</option>`;
        }

        function switchTab(t) {
            if(editId) resetForm();
            currentTab = t;
            document.querySelectorAll('#sec-main button[id^="tab-"]').forEach(b => { b.classList.remove('active-tab'); b.classList.add('text-slate-400'); });
            document.getElementById('tab-' + t).classList.add('active-tab');
            document.getElementById('unit-txt').innerText = STYLE[t].unit;
            document.getElementById('note-container').classList.toggle('hidden', t !== 'Altro');
            initMonths(); updateUI();
        }

        function initMonths() {
            const grid = document.getElementById('grid-months'), year = document.getElementById('in-year').value;
            let used = [];
            dataStore.filter(d => d.type === currentTab && d.year.toString() === year.toString() && d.id !== editId).forEach(d => {
                used = [...used, ...d.months.split(", ").map(m => m.split(" (")[0].trim())];
            });
            grid.innerHTML = '';
            MONTHS.forEach(m => {
                const b = document.createElement('button');
                const isU = used.includes(m);
                b.innerText = m[0];
                b.className = isU ? "py-3 rounded-xl text-[10px] font-bold border disabled-month" : "py-3 rounded-xl text-[10px] font-bold border border-slate-700 bg-slate-900 text-slate-500 transition-all";
                if(selectedMonths.includes(m)) b.classList.add('active-month');
                if(!isU) b.onclick = () => { if(selectedMonths.includes(m)) { selectedMonths = selectedMonths.filter(x => x !== m); b.classList.remove('active-month'); } else { selectedMonths.push(m); b.classList.add('active-month'); } };
                grid.appendChild(b);
            });
        }

        function initCharts() {
            mainChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
                type: 'line',
                data: { labels: MONTHS, datasets: [
                    { label: 'Qta', data: Array(12).fill(0), borderColor: '#2563eb', borderWidth: 3, pointRadius: 4, pointBackgroundColor: '#2563eb', yAxisID: 'y' },
                    { label: '€', data: Array(12).fill(0), borderColor: '#f1f5f9', borderWidth: 1, pointRadius: 3, pointBackgroundColor: '#f1f5f9', yAxisID: 'y1' }
                ]},
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, y1: { display: false, position: 'right' }, x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 9 } } } } }
            });
            analysisPieChart = new Chart(document.getElementById('analysisPieChart').getContext('2d'), { type: 'doughnut', data: { labels: Object.keys(STYLE), datasets: [{ data: [1,1,1,1,1], backgroundColor: Object.values(STYLE).map(s => s.color), borderWidth: 0 }] }, options: { cutout: '80%', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        function fetchData() {
            updateStatus('Sincro...', 'bg-orange-500 animate-pulse');
            const script = document.createElement('script'), cb = 'cb_' + Date.now();
            window[cb] = (data) => { dataStore = data; updateUI(); initMonths(); updateStatus('Online', 'bg-emerald-500'); delete window[cb]; document.body.removeChild(script); };
            script.src = `${API_URL}?callback=${cb}&t=${Date.now()}`;
            document.body.appendChild(script);
        }

        async function saveData() {
            const qty = document.getElementById('in-qty').value, year = document.getElementById('in-year').value, cost = document.getElementById('in-cost').value;
            if(!cost || selectedMonths.length === 0) return alert("Dati mancanti");
            const entry = { id: editId || Date.now(), type: currentTab, year, months: selectedMonths.sort((a,b) => MONTHS.indexOf(a) - MONTHS.indexOf(b)).join(", ") + (currentTab === 'Altro' && document.getElementById('in-note').value ? ` (${document.getElementById('in-note').value})` : ""), quantity: parseFloat(qty) || 0, cost: parseFloat(cost) || 0 };
            const btn = document.getElementById('btn-save'); btn.innerText = "Salvo..."; btn.disabled = true;
            try { 
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) }); 
                if(editId) dataStore = dataStore.filter(d => d.id !== editId);
                dataStore.push(entry); 
                updateUI(); resetForm(); setTimeout(fetchData, 1000); 
            } catch (e) { alert("Errore Cloud"); } finally { btn.disabled = false; btn.innerText = "Salva"; }
        }

        function editEntry(id) {
            const d = dataStore.find(x => x.id == id); if(!d) return;
            editId = id;
            document.getElementById('form-card').classList.add('edit-mode');
            document.getElementById('form-title').innerText = "Modifica";
            document.getElementById('btn-cancel-edit').classList.remove('hidden');
            document.getElementById('btn-save').innerText = "Aggiorna";
            document.getElementById('btn-save').classList.replace('bg-blue-600', 'bg-amber-600');
            document.getElementById('in-year').value = d.year;
            document.getElementById('in-cost').value = d.cost;
            document.getElementById('in-qty').value = d.quantity;
            const mParts = d.months.split(" (");
            selectedMonths = mParts[0].split(", ").map(m => m.trim());
            if(mParts[1]) document.getElementById('in-note').value = mParts[1].replace(")", "");
            initMonths(); window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            editId = null;
            document.getElementById('form-card').classList.remove('edit-mode');
            document.getElementById('form-title').innerText = "Nuovo Inserimento";
            document.getElementById('btn-cancel-edit').classList.add('hidden');
            document.getElementById('btn-save').innerText = "Salva";
            document.getElementById('btn-save').classList.replace('bg-amber-600', 'bg-blue-600');
            document.getElementById('in-qty').value = ''; document.getElementById('in-cost').value = ''; document.getElementById('in-note').value = '';
            selectedMonths = []; initMonths();
        }

        function updateUI() {
            const y = document.getElementById('in-year').value, qV = Array(12).fill(0), cV = Array(12).fill(0);
            const filtered = dataStore.filter(d => d.type === currentTab && d.year.toString() === y.toString());
            filtered.forEach(d => {
                d.months.split(", ").map(m => m.split(" (")[0].trim()).forEach(m => {
                    let i = MONTHS.indexOf(m); if(i !== -1) { 
                        qV[i] += (parseFloat(d.quantity) / d.months.split(", ").length); 
                        cV[i] += (parseFloat(d.cost) / d.months.split(", ").length); 
                    }
                });
            });
            mainChart.data.datasets[0].data = qV; mainChart.data.datasets[1].data = cV; mainChart.update();
            
            const energyData = dataStore.filter(d => d.type === currentTab).sort((a,b) => b.id - a.id);
            const currentYearData = energyData.filter(d => d.year.toString() === new Date().getFullYear().toString());
            
            // 1. Widget Ultima Bolletta (con durata)
            if(energyData.length > 0) {
                const last = energyData[0];
                const numMesi = last.months.split(", ").length;
                let durataTesto = numMesi === 1 ? "MENSILE" : (numMesi === 2 ? "BIMESTRALE" : `${numMesi} MESI`);
                
                document.getElementById('widget-last-cost').innerText = `€ ${parseFloat(last.cost).toFixed(2)}`;
                document.getElementById('widget-last-qty').innerHTML = `${last.quantity} ${STYLE[currentTab].unit}<br><span class="text-[8px] text-blue-500 opacity-80">${durataTesto}</span>`;
            } else {
                document.getElementById('widget-last-cost').innerText = "€ 0.00";
                document.getElementById('widget-last-qty').innerText = "-";
            }

            // 2. Widget Media Anno Corrente
            if(currentYearData.length > 0) {
                const totC = currentYearData.reduce((a,c) => a + parseFloat(c.cost), 0);
                const totQ = currentYearData.reduce((a,c) => a + parseFloat(c.quantity), 0);
                let mSet = new Set(); currentYearData.forEach(d => d.months.split(", ").forEach(m => mSet.add(m.split(" (")[0].trim())));
                const mCount = mSet.size || 1;
                document.getElementById('widget-avg-cost').innerText = `€ ${(totC/mCount).toFixed(2)}`;
                document.getElementById('widget-avg-qty').innerText = `${(totQ/mCount).toFixed(1)} ${STYLE[currentTab].unit}/MESE`;
            } else {
                document.getElementById('widget-avg-cost').innerText = "€ 0.00";
                document.getElementById('widget-avg-qty').innerText = "NESSUN DATO 2026";
            }

            const list = document.getElementById('history-list'); list.innerHTML = '';
            energyData.slice(0, 10).forEach(d => {
                const dv = document.createElement('div'); dv.className = "card p-4 flex justify-between items-center text-xs active:scale-95 transition-all";
                dv.onclick = () => editEntry(d.id);
                dv.innerHTML = `<div><b class="text-blue-500">${d.year}</b><br><span class="text-slate-400 uppercase font-bold">${d.months}</span></div><div class="text-right"><b class="text-white">${d.quantity} ${STYLE[d.type].unit}</b><br><span class="text-emerald-500 font-bold">€${parseFloat(d.cost).toFixed(2)}</span></div>`;
                list.appendChild(dv);
            });
        }

        function updateAnalysisUI() {
            const filterYear = document.getElementById('analysis-year-filter').value;
            let totAnnuo = 0;
            const grid = document.getElementById('stats-grid'); grid.innerHTML = '';
            const stats = Object.keys(STYLE).map(type => {
                const entries = dataStore.filter(d => d.type === type && d.year.toString() === filterYear.toString());
                const cost = entries.reduce((a, c) => a + parseFloat(c.cost), 0);
                const qty = entries.reduce((a, c) => a + parseFloat(c.quantity), 0);
                let months = new Set(); entries.forEach(e => e.months.split(", ").forEach(m => months.add(m.split(" (")[0].trim())));
                totAnnuo += cost;
                return { type, cost, qty, mCount: months.size };
            });
            stats.forEach(s => {
                const perc = totAnnuo > 0 ? ((s.cost / totAnnuo) * 100).toFixed(1) : 0;
                const mediaMensile = s.mCount > 0 ? (s.cost / s.mCount).toFixed(2) : '0';
                const dv = document.createElement('div'); 
                dv.className = "card p-5 flex justify-between items-center border-l-4 shadow-sm";
                dv.style.borderLeftColor = STYLE[s.type].color;
                let consumptionInfo = "";
                if (['Luce', 'Gas', 'Acqua'].includes(s.type)) {
                    const mediaQty = s.mCount > 0 ? (s.qty / s.mCount).toFixed(1) : '0';
                    consumptionInfo = `<div class="mt-2 space-y-0.5"><p class="text-[12px] text-blue-400 font-bold leading-none">Tot: ${s.qty.toFixed(1)} ${STYLE[s.type].unit}</p><p class="text-[10px] text-slate-400 font-medium">Med: ${mediaQty} ${STYLE[s.type].unit}/mese</p></div>`;
                }
                dv.innerHTML = `<div class="flex flex-col"><span class="text-[11px] font-black text-slate-500 uppercase leading-none mb-1">${s.type}</span><span class="text-[14px] font-bold text-white/90">Spesa: €${mediaMensile}/mese</span>${consumptionInfo}</div><div class="text-right"><span class="text-2xl font-black">€${s.cost.toFixed(2)}</span><br><span class="text-[11px] font-bold text-blue-500 uppercase tracking-tighter">${perc}% del totale</span></div>`;
                grid.appendChild(dv);
            });
            document.getElementById('stat-total-year').innerText = `€ ${totAnnuo.toFixed(2)}`;
            const allYearMonths = new Set();
            dataStore.filter(d => d.year.toString() === filterYear.toString()).forEach(d => d.months.split(", ").forEach(m => allYearMonths.add(m.split(" (")[0].trim())));
            const mesiEffettivi = allYearMonths.size;
            document.getElementById('stat-avg-month').innerText = `€ ${mesiEffettivi > 0 ? (totAnnuo / mesiEffettivi).toFixed(2) : '0.00'}`;
            document.getElementById('stat-avg-info').innerText = mesiEffettivi > 0 ? `Analisi su ${mesiEffettivi} mesi` : 'Dati mancanti';
            analysisPieChart.data.datasets[0].data = stats.map(s => s.cost); 
            analysisPieChart.update();
        }

        function updatePredictionUI() {
            const list = document.getElementById('prediction-list'); list.innerHTML = '';
            Object.keys(STYLE).forEach(type => {
                const entries = dataStore.filter(d => d.type === type).sort((a,b) => b.id - a.id);
                if(entries.length === 0) return;
                const last = entries[0];
                const lastMonths = last.months.split(", ").map(m => m.split(" (")[0].trim());
                const lastIdx = MONTHS.indexOf(lastMonths[lastMonths.length - 1]);
                let nextMonths = [];
                for(let i=1; i<=STYLE[type].freq; i++) { nextMonths.push(MONTHS[(lastIdx + i) % 12].toUpperCase()); }
                const costo = (parseFloat(last.cost) / lastMonths.length) * STYLE[type].freq;
                const dv = document.createElement('div'); dv.className = "card p-5 prediction-card";
                dv.style.borderLeftColor = STYLE[type].color;
                dv.innerHTML = `<div class="flex justify-between items-start"><div><p class="text-[10px] font-black text-slate-500 uppercase">${type}</p><p class="text-lg font-black mt-1">${nextMonths[nextMonths.length-1]} ${lastIdx + STYLE[type].freq > 11 ? parseInt(last.year)+1 : last.year}</p><p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">Periodo: ${STYLE[type].labelFreq} (${nextMonths.join(",")})</p></div><div class="text-right"><p class="text-[10px] font-black text-emerald-500 uppercase">Stima</p><p class="text-2xl font-black">€${costo.toFixed(2)}</p></div></div>`;
                list.appendChild(dv);
            });
        }

        function updateStatus(t, c) { document.getElementById('status-text').innerText = t; document.getElementById('status-dot').className = `rounded-full transition-all duration-500 ${c.includes('emerald') ? 'bg-emerald-500 online' : 'bg-orange-500'}`; }
    </script>
</body>
</html>
