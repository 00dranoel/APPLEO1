<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBill Cloud</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer } = Recharts;
        const { Zap, Flame, Droplet, Trash2, LayoutDashboard, Cloud } = lucide;

        const DEFAULT_SHEET_URL = "https://script.google.com/macros/s/AKfycbwdX79XjM80nugi1kCuGeJ131CACVTpcCL3UBNB8A_7IOuDQ8oIkJ7iTVQCI2nETTRVnw/exec";
        
        const ENERGY_TYPES = {
            Luce: { icon: Zap, color: '#eab308', unit: 'kWh' },
            Gas: { icon: Flame, color: '#f97316', unit: 'Smc' },
            Acqua: { icon: Droplet, color: '#3b82f6', unit: 'm³' }
        };
        
        const MONTHS_NAMES = ['G', 'F', 'M', 'A', 'M', 'G', 'L', 'A', 'S', 'O', 'N', 'D'];
        const FULL_MONTHS = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];

        function App() {
            const [bills, setBills] = useState(() => {
                const saved = localStorage.getItem('smartbill_v2_clean');
                return saved ? JSON.parse(saved) : [];
            });
            const [activeTab, setActiveTab] = useState('Luce');
            const [isSyncing, setIsSyncing] = useState(false);
            const [newBill, setNewBill] = useState({ type: 'Luce', quantity: '', cost: '', year: new Date().getFullYear(), months: [] });

            useEffect(() => { 
                localStorage.setItem('smartbill_v2_clean', JSON.stringify(bills)); 
            }, [bills]);

            const duplicateMonths = useMemo(() => {
                const existing = bills.filter(b => b.type === newBill.type && b.year === parseInt(newBill.year)).flatMap(b => b.months);
                return newBill.months.filter(m => existing.includes(m));
            }, [newBill, bills]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!newBill.quantity || newBill.months.length === 0 || duplicateMonths.length > 0) return;
                
                const billData = { 
                    ...newBill, 
                    id: Date.now(), 
                    quantity: parseFloat(newBill.quantity), 
                    cost: parseFloat(newBill.cost) || 0, 
                    year: parseInt(newBill.year) 
                };
                
                setBills([...bills, billData]);
                setNewBill({ ...newBill, quantity: '', cost: '', months: [] });
                setIsSyncing(true);
                
                try { 
                    await fetch(DEFAULT_SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(billData) }); 
                } catch (err) {
                    console.error("Sync error");
                }
                setTimeout(() => setIsSyncing(false), 1000);
            };

            const chartData = useMemo(() => {
                return Array(12).fill(0).map((_, i) => {
                    const filtered = bills.filter(b => b.type === activeTab && b.months.includes(i));
                    const sum = filtered.reduce((acc, curr) => acc + (curr.quantity / curr.months.length), 0);
                    return { name: FULL_MONTHS[i], avg: parseFloat(sum.toFixed(2)) };
                });
            }, [bills, activeTab]);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-10">
                    <header className="p-6 flex justify-between items-center bg-white border-b border-slate-100 sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-blue-600 p-2 rounded-lg text-white"><LayoutDashboard size={18} /></div>
                            <h1 className="font-black text-slate-800">SmartBill</h1>
                        </div>
                        {isSyncing && <Cloud size={20} className="text-blue-500 animate-pulse" />}
                    </header>

                    <main className="p-4 space-y-6">
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="flex gap-1 p-1 bg-slate-100 rounded-xl">
                                    {Object.keys(ENERGY_TYPES).map(t => (
                                        <button key={t} type="button" onClick={() => setNewBill({...newBill, type: t})} className={`flex-1 py-2 rounded-lg text-[10px] font-bold ${newBill.type === t ? 'bg-white shadow text-slate-900' : 'text-slate-400'}`}>{t.toUpperCase()}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-6 gap-1">
                                    {MONTHS_NAMES.map((m, i) => (
                                        <button key={i} type="button" onClick={() => setNewBill(prev => ({ ...prev, months: prev.months.includes(i) ? prev.months.filter(x => x !== i) : [...prev.months, i].sort((a,b)=>a-b) }))} className={`h-8 rounded-lg text-[10px] font-bold border ${newBill.months.includes(i) ? (duplicateMonths.includes(i) ? 'bg-red-500 border-red-500 text-white' : 'bg-slate-800 border-slate-800 text-white') : 'bg-white border-slate-100 text-slate-400'}`}>{m}</button>
                                    ))}
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="number" className="bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none" value={newBill.year} onChange={e => setNewBill({...newBill, year: e.target.value})} />
                                    <input type="number" step="0.01" className="bg-slate-50 p-3 rounded-xl text-sm font-bold outline-none" placeholder="Costo €" value={newBill.cost} onChange={e => setNewBill({...newBill, cost: e.target.value})} />
                                </div>
                                <input type="number" step="0.01" required className="w-full text-3xl font-black text-center p-4 outline-none" placeholder="0.00" value={newBill.quantity} onChange={e => setNewBill({...newBill, quantity: e.target.value})} />
                                <button type="submit" className={`w-full py-4 rounded-2xl font-black text-xs uppercase tracking-widest ${duplicateMonths.length > 0 ? 'bg-red-100 text-red-500' : 'bg-blue-600 text-white shadow-lg shadow-blue-100'}`}>
                                    {duplicateMonths.length > 0 ? 'Mesi Duplicati' : 'Salva Cloud'}
                                </button>
                            </form>
                        </div>

                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200">
                            <h3 className="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-widest">Consumi {activeTab}</h3>
                            <div className="h-40">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={chartData}>
                                        <XAxis dataKey="name" tick={{fontSize: 8, fontWeight: 800}} axisLine={false} tickLine={false} />
                                        <Bar dataKey="avg" fill={ENERGY_TYPES[activeTab].color} radius={[4, 4, 4, 4]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="flex justify-center gap-4 mt-4">
                                {Object.keys(ENERGY_TYPES).map(t => (
                                    <button key={t} onClick={() => setActiveTab(t)} className={`w-3 h-3 rounded-full ${activeTab === t ? 'ring-4 ring-slate-100' : 'opacity-20'}`} style={{backgroundColor: ENERGY_TYPES[t].color}}></button>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
