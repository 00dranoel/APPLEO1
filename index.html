<!DOCTYPE html>
<html>
<head>

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-blue-500 flex items-center justify-center min-h-screen">
    <div id="root"></div>
    <script type="text/babel">

            return (
                <div className="bg-white p-10 rounded-3xl shadow-2xl text-center">
                    <h1 className="text-3xl font-black text-blue-600">SMARTBILL ONLINE! 🚀</h1>
                    <p className="text-slate-500 mt-2">Se vedi questo messaggio, la tua pagina funziona.</p>
                    <button 
                        onClick={() => alert('Funziona anche il tasto!')}
                        className="mt-5 bg-blue-600 text-white px-6 py-2 rounded-full font-bold">
                        PROVA TASTO
                    </button>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
