<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartBill Cloud Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .active-tab { background-color: #1e293b !important; color: white !important; }
        .active-month { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; }
    </style>
</head>
<body class="pb-10">

    <header class="p-5 flex justify-between items-center bg-white border-b sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 text-white rounded-xl shadow-lg">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none">SmartBill</h1>
                <div id="status-container" class="flex items-center gap-1.5 mt-1">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <span id="status-text" class="text-[9px] font-bold text-slate-400 uppercase">Sincronizzazione...</span>
                </div>
            </div>
        </div>
        <button onclick="fetchData()" class="p-2 text-blue-600 font-bold text-[10px] uppercase">Aggiorna</button>
    </header>

    <main class="p-4 space-y-6 max-w-md mx-auto">
        <div class="card p-1 flex gap-1 shadow-sm">
            <button onclick="switchTab('Luce')" id="tab-Luce" class="active-tab flex-1 py-3 rounded-xl font-bold text-[10px] uppercase">Luce</button>
            <button onclick="switchTab('Gas')" id="tab-Gas" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase text-slate-400">Gas</button>
            <button onclick="switchTab('Acqua')" id="tab-Acqua" class="flex-1 py-3 rounded-xl font-bold text-[10px] uppercase text-slate-400">Acqua</button>
        </div>

        <div class="card p-5 h-52 shadow-sm">
            <canvas id="mainChart"></canvas>
        </div>

        <div class="card p-6 space-y-5 shadow-sm border-t-4 border-blue-600">
            <div class="grid grid-cols-4 gap-1" id="grid-months"></div>
            <div class="grid grid-cols-2 gap-3">
                <input type="number" id="in-year" class="bg-slate-50 p-3 rounded-xl font-bold border border-slate-100 outline-none">
                <input type="number" id="in-cost" placeholder="€ Costo" class="bg-slate-50 p-3 rounded-xl font-bold border border-slate-100 outline-none">
            </div>
            <input type="number" id="in-qty" placeholder="0.00" class="w-full text-5xl font-black text-center outline-none">
            <button onclick="saveData()" id="btn-save" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold uppercase shadow-xl active:scale-95 transition-all">
                Salva nel Cloud
            </button>
        </div>

        <div id="history-list" class="space-y-3"></div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw1xjt9doYN9C0iulj1PTTu_e6MQsF7pRL8Kh9TuTaN15fI-HTYL_aR453avosJ6zyjdw/exec";
        const MONTHS_FULL = ["Gen", "Feb", "Mar", "Apr", "Mag", "Giu", "Lug", "Ago", "Set", "Ott", "Nov", "Dic"];
        const STYLE = { Luce: { color: '#eab308', unit: 'kWh' }, Gas: { color: '#f97316', unit: 'Smc' }, Acqua: { color: '#3b82f6', unit: 'm³' } };

        let currentTab = 'Luce';
        let selectedMonths = [];
        let dataStore = [];

        const ctx = document.getElementById('mainChart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'bar',
            data: { labels: MONTHS_FULL, datasets: [{ data: Array(12).fill(0), borderRadius: 5 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });

        window.onload = () => {
            document.getElementById('in-year').value = new Date().getFullYear();
            initMonths();
            fetchData();
        };

        function initMonths() {
            const grid = document.getElementById('grid-months'); grid.innerHTML = '';
            MONTHS_FULL.forEach((m, i) => {
                const b = document.createElement('button');
                b.innerText = m; b.className = "py-2 rounded-lg text-[10px] font-bold border bg-white text-slate-400 transition-all";
                b.onclick = () => {
                    if(selectedMonths.includes(m)) { selectedMonths = selectedMonths.filter(x => x !== m); b.classList.remove('active-month'); }
                    else { selectedMonths.push(m); b.classList.add('active-month'); }
                };
                grid.appendChild(b);
            });
        }

        function fetchData() {
            updateStatus('SINCRO...', 'bg-orange-400 animate-pulse');
            const script = document.createElement('script');
            const cb = 'cb_' + Date.now();
            window[cb] = (data) => {
                dataStore = data;
                updateUI();
                updateStatus('ONLINE', 'bg-green-500');
                delete window[cb];
                document.body.removeChild(script);
            };
            script.src = `${API_URL}?callback=${cb}&t=${Date.now()}`;
            document.body.appendChild(script);
        }

        async function saveData() {
            const qty = document.getElementById('in-qty').value;
            const year = document.getElementById('in-year').value;
            const btn = document.getElementById('btn-save');

            if(!qty || selectedMonths.length === 0) return alert("Dati mancanti!");

            const entry = {
                id: Date.now(),
                type: currentTab,
                year: year,
                months: selectedMonths.join(", "), // Salva come "Gen, Feb"
                quantity: parseFloat(qty),
                cost: parseFloat(document.getElementById('in-cost').value) || 0
            };

            btn.innerText = "INVIO...";
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entry) });
                dataStore.push(entry);
                updateUI();
                resetForm();
                setTimeout(fetchData, 2000);
            } catch (e) { alert("Errore connessione"); }
            finally { btn.innerText = "Salva nel Cloud"; }
        }

        function updateUI() {
            const values = Array(12).fill(0);
            dataStore.filter(d => d.type === currentTab).forEach(d => {
                let ms = d.months.split(", ").map(m => m.trim());
                ms.forEach(m => {
                    let idx = MONTHS_FULL.indexOf(m);
                    if(idx !== -1) values[idx] += (parseFloat(d.quantity) / ms.length);
                });
            });
            chart.data.datasets[0].data = values;
            chart.data.datasets[0].backgroundColor = STYLE[currentTab].color;
            chart.update();

            const list = document.getElementById('history-list'); list.innerHTML = '';
            [...dataStore].reverse().slice(0, 10).forEach(d => {
                const div = document.createElement('div');
                div.className = "card p-4 flex justify-between items-center text-xs shadow-sm";
                div.innerHTML = `<div><b>${d.type} ${d.year}</b><br><span class="text-slate-400">${d.months}</span></div><div class="text-right"><b>${d.quantity} ${STYLE[d.type].unit}</b><br>€${parseFloat(d.cost).toFixed(2)}</div>`;
                list.appendChild(div);
            });
        }

        function updateStatus(txt, cls) {
            document.getElementById('status-text').innerText = txt;
            document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${cls}`;
        }

        function switchTab(t) {
            currentTab = t;
            ['Luce','Gas','Acqua'].forEach(id => document.getElementById('tab-'+id).className = id === t ? 'active-tab flex-1 py-3 rounded-xl font-bold text-[10px] uppercase' : 'flex-1 py-3 rounded-xl font-bold text-[10px] uppercase text-slate-400');
            updateUI();
        }

        function resetForm() { document.getElementById('in-qty').value = ''; document.getElementById('in-cost').value = ''; selectedMonths = []; initMonths(); }
    </script>
</body>
</html>
